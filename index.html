<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boundary Doesn't Exist</title>
    <meta name="description" content="2Dと3Dの境界が溶け合い、人間の空間認識を揺さぶる知覚システム。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Outfit', sans-serif; }

        #webgl-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
        }

        #start-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #0a0a18 0%, #000005 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1.2s ease;
        }
        #start-overlay.hidden { opacity: 0; pointer-events: none; }

        .overlay-content {
            text-align: center;
            max-width: 560px;
            padding: 48px;
        }

        h1.title {
            font-family: 'Outfit', sans-serif;
            font-weight: 200;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: 0.12em;
            color: #e8e8ff;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: #5555aa;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #6666cc, transparent);
            margin: 0 auto 36px;
        }

        .description {
            font-weight: 300;
            font-size: 0.9rem;
            line-height: 1.9;
            color: #7777aa;
            margin-bottom: 52px;
        }

        #start-button {
            display: inline-block;
            padding: 14px 44px;
            background: transparent;
            border: 1px solid rgba(100,100,200,0.5);
            color: #9999dd;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        #start-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(80,80,180,0.1);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        #start-button:hover::before { transform: scaleX(1); }
        #start-button:hover {
            border-color: rgba(150,150,255,0.8);
            color: #ccccff;
        }

        .controls-hint {
            margin-top: 24px;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: #333355;
            letter-spacing: 0.15em;
        }

        /* UI */
        #ui-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 16px; height: 16px;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.4);
        }
        #crosshair::before { width: 1px; height: 100%; left: 50%; }
        #crosshair::after  { width: 100%; height: 1px; top: 50%; }

        #spatiality-indicator {
            position: absolute;
            top: 24px; left: 24px;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: #5555aa;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #spatiality-indicator.visible { opacity: 1; }

        #error-msg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(180,0,0,0.85);
            color: #fff;
            padding: 24px 36px;
            font-family: monospace;
            font-size: 0.85rem;
            max-width: 80vw;
            z-index: 999;
            display: none;
            border-radius: 4px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <canvas id="webgl-canvas"></canvas>

    <div id="start-overlay">
        <div class="overlay-content">
            <h1 class="title">The Boundary Doesn't Exist</h1>
            <p class="subtitle">Between 2D &amp; 3D</p>
            <div class="divider"></div>
            <p class="description">
                この世界に、固定された次元は存在しません。<br>
                音、光、影、厚み、そしてカメラの歪み。<br>
                知覚を構成する要素はそれぞれ、独自の次元を漂っています。
            </p>
            <button id="start-button">Enter Experience</button>
            <p class="controls-hint">W A S D — 移動 &nbsp;|&nbsp; Mouse — 視点移動</p>
        </div>
    </div>

    <div id="ui-overlay">
        <div id="crosshair"></div>
        <div id="spatiality-indicator">
            <span id="area-name" style="color:#ff6688;font-size:0.7rem;"></span><br>
            <span id="state-val"></span>
        </div>
    </div>

    <div id="error-msg"></div>

    <!-- Three.js を CDN から読み込む (Import Map) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <!-- メインスクリプト -->
    <script type="module">
        import * as THREE from 'three';

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.style.display = 'block';
            el.textContent = '⚠ ERROR:\n' + msg;
            console.error(msg);
        }

        window.onerror = (msg, src, line, col, err) => {
            showError((err ? err.stack : msg) || msg);
        };
        window.addEventListener('unhandledrejection', e => {
            showError(String(e.reason?.stack || e.reason || e));
        });

        try {
            // =============================================
            // THREE.js セットアップ
            // =============================================
            const canvas = document.getElementById('webgl-canvas');
            const startOverlay = document.getElementById('start-overlay');
            const startBtn = document.getElementById('start-button');
            const indicator = document.getElementById('spatiality-indicator');
            const areaNameEl = document.getElementById('area-name');
            const stateValEl = document.getElementById('state-val');

            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0e0e22);
            scene.fog = new THREE.FogExp2(0x0e0e22, 0.007);

            // カメラ
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 1.8, 5);

            // ライト
            scene.add(new THREE.AmbientLight(0xbbbbff, 1.2));  // 環境光を強く
            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(30, 60, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.set(1024, 1024);
            sun.shadow.camera.near = 1;
            sun.shadow.camera.far = 200;
            sun.shadow.camera.left = -60;
            sun.shadow.camera.right = 60;
            sun.shadow.camera.top = 60;
            sun.shadow.camera.bottom = -60;
            scene.add(sun);
            // 補助光（逆側から柔らかく照らす）
            const fill = new THREE.DirectionalLight(0x4466ff, 0.8);
            fill.position.set(-20, 30, -30);
            scene.add(fill);
            // ポイントライト（ポータル付近を照らす）
            const portalLight = new THREE.PointLight(0x6644ff, 3.0, 20);
            portalLight.position.set(0, 4, -3);
            scene.add(portalLight);

            // =============================================
            // ワールド構築（シンプル版）
            // =============================================
            // 地面
            const groundGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x181828, roughness: 0.9 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // グリッド補助線
            const grid = new THREE.GridHelper(200, 40, 0x4444aa, 0x222266);
            scene.add(grid);

            // 木々（円錐）
            const treeMat = new THREE.MeshStandardMaterial({ color: 0x2d6e38, roughness: 0.7, emissive: 0x0a1a0c, emissiveIntensity: 0.2 });
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6b4c2a, roughness: 0.9 });
            const objects = []; // 衝突判定用

            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = 8 + Math.random() * 50;
                const x = Math.cos(angle) * r;
                const z = Math.sin(angle) * r;
                const h = 4 + Math.random() * 4;

                // 葉
                const leaf = new THREE.Mesh(new THREE.ConeGeometry(1.5 + Math.random(), h, 7), treeMat);
                leaf.position.set(x, h / 2 + 1.5, z);
                leaf.castShadow = true;
                leaf.receiveShadow = true;
                scene.add(leaf);

                // 幹
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 2, 6), trunkMat);
                trunk.position.set(x, 1, z);
                trunk.castShadow = true;
                scene.add(trunk);

                objects.push({ x, z, radius: 1.2 });
            }

            // 幾何学オブジェ（影の広場）
            const cubeMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3f, roughness: 0.4, metalness: 0.6 });
            for (let i = 0; i < 12; i++) {
                const x = 22 + (Math.random() - 0.5) * 18;
                const z = (Math.random() - 0.5) * 28;
                const size = 1.5 + Math.random() * 2;
                const geo = i % 2 === 0
                    ? new THREE.BoxGeometry(size, size, size)
                    : new THREE.OctahedronGeometry(size * 0.7);
                const mesh = new THREE.Mesh(geo, cubeMat);
                mesh.position.set(x, size / 2, z);
                mesh.rotation.y = Math.random() * Math.PI;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                objects.push({ x, z, radius: size * 0.6 });
            }

            // 柱（幽霊回廊）
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0xddddf0, roughness: 0.3, metalness: 0.2 });
            for (let i = 0; i < 8; i++) {
                const x = -10 + (i % 4) * 9;
                const z = 20 + Math.floor(i / 4) * 10;
                const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 10, 12), pillarMat);
                pillar.position.set(x, 5, z);
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                scene.add(pillar);
                objects.push({ x, z, radius: 1.0 });
            }

            // ポータルリング
            const portalMat = new THREE.MeshStandardMaterial({
                color: 0x6644ff, emissive: 0x2211aa, emissiveIntensity: 0.5,
                roughness: 0.2, metalness: 0.8
            });
            const portal = new THREE.Mesh(new THREE.TorusGeometry(1.8, 0.3, 16, 64), portalMat);
            portal.position.set(0, 2.5, -3);
            scene.add(portal);

            // =============================================
            // プレイヤー状態
            // =============================================
            const player = {
                pos: new THREE.Vector3(0, 1.8, 5),
                yaw: 0,
                pitch: 0,
                radius: 0.6,
                speed: 6.0,
            };
            const keys = {};
            let locked = false;
            let started = false;

            // =============================================
            // Spatiality システム（シンプル版）
            // =============================================
            const areas = [
                { name: 'THE PORTAL',        x:  0, z:   0, r: 12, desc: 'DIMENSION: HYBRID',   fov: 70, fog: 0.012 },
                { name: 'THE FLAT WOODS',     x:  0, z: -25, r: 18, desc: 'FLAT AUDITORY SOLID', fov: 15, fog: 0.025 },
                { name: 'THE SHADOW PLAZA',   x: 25, z:   0, r: 18, desc: 'PROJECTED GHOST',     fov: 45, fog: 0.008 },
                { name: 'THE GHOSTLY PALACE', x:  0, z:  25, r: 18, desc: 'COMPRESSED MONOLITH', fov: 25, fog: 0.015 },
                { name: 'THE MISTY RIFT',     x:-25, z:   0, r: 18, desc: 'DEPTHLESS COLLAPSE',  fov: 10, fog: 0.08  },
            ];

            let currentFov = 70;
            let currentFog = 0.012;
            let currentAreaName = 'THE PORTAL';
            let currentDesc = 'DIMENSION: HYBRID';

            function updateSpatiality() {
                let totalW = 0;
                let blendFov = 0, blendFog = 0;
                let maxW = -1;

                for (const a of areas) {
                    const dx = player.pos.x - a.x;
                    const dz = player.pos.z - a.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    const w = Math.max(0, 1.0 - dist / (a.r * 1.8));
                    totalW += w;
                    blendFov += a.fov * w;
                    blendFog += a.fog * w;
                    if (w > maxW) {
                        maxW = w;
                        currentAreaName = a.name;
                        currentDesc = a.desc;
                    }
                }

                if (totalW > 0) {
                    currentFov += (blendFov / totalW - currentFov) * 0.03;
                    currentFog += (blendFog / totalW - currentFog) * 0.03;
                }

                camera.fov = currentFov;
                camera.updateProjectionMatrix();
                scene.fog.density = currentFog;
            }

            // =============================================
            // ポインターロック / 入力
            // =============================================
            startBtn.addEventListener('click', () => {
                canvas.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                locked = document.pointerLockElement === canvas;
                if (locked) {
                    if (!started) {
                        started = true;
                        // Audio Context（ユーザー操作後に初期化）
                        try { initAudio(); } catch(e) { console.warn('Audio init failed:', e); }
                    }
                    startOverlay.classList.add('hidden');
                    indicator.classList.add('visible');
                } else {
                    startOverlay.classList.remove('hidden');
                    indicator.classList.remove('visible');
                }
            });

            document.addEventListener('mousemove', e => {
                if (!locked) return;
                const s = 0.002;
                player.yaw   -= e.movementX * s;
                player.pitch -= e.movementY * s;
                player.pitch = Math.max(-1.4, Math.min(1.4, player.pitch));
            });

            document.addEventListener('keydown', e => { keys[e.code] = true; });
            document.addEventListener('keyup',   e => { keys[e.code] = false; });

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });

            // =============================================
            // オーディオ（超シンプル版）
            // =============================================
            let audioCtx = null;
            function initAudio() {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // ドローンノイズ
                const bufSize = audioCtx.sampleRate * 2;
                const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;

                const src = audioCtx.createBufferSource();
                src.buffer = buf;
                src.loop = true;

                const flt = audioCtx.createBiquadFilter();
                flt.type = 'bandpass';
                flt.frequency.value = 120;
                flt.Q.value = 2;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 3);

                src.connect(flt);
                flt.connect(gain);
                gain.connect(audioCtx.destination);
                src.start();
            }

            // =============================================
            // メインループ
            // =============================================
            const clock = new THREE.Clock();
            const moveDir = new THREE.Vector3();

            function animate() {
                requestAnimationFrame(animate);

                const dt = Math.min(clock.getDelta(), 0.05);

                if (locked) {
                    // 移動
                    moveDir.set(0, 0, 0);
                    if (keys['KeyW'] || keys['ArrowUp'])    moveDir.z -= 1;
                    if (keys['KeyS'] || keys['ArrowDown'])  moveDir.z += 1;
                    if (keys['KeyA'] || keys['ArrowLeft'])  moveDir.x -= 1;
                    if (keys['KeyD'] || keys['ArrowRight']) moveDir.x += 1;

                    if (moveDir.lengthSq() > 0) {
                        moveDir.normalize();
                        const cos = Math.cos(player.yaw);
                        const sin = Math.sin(player.yaw);
                        const wx = moveDir.x * cos - moveDir.z * sin;
                        const wz = moveDir.x * sin + moveDir.z * cos;
                        player.pos.x += wx * player.speed * dt;
                        player.pos.z += wz * player.speed * dt;
                    }

                    // 境界
                    player.pos.x = Math.max(-90, Math.min(90, player.pos.x));
                    player.pos.z = Math.max(-90, Math.min(90, player.pos.z));

                    // 衝突判定
                    for (const o of objects) {
                        const dx = player.pos.x - o.x;
                        const dz = player.pos.z - o.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        const minD = player.radius + o.radius;
                        if (dist < minD && dist > 0.001) {
                            const overlap = minD - dist;
                            player.pos.x += (dx / dist) * overlap;
                            player.pos.z += (dz / dist) * overlap;
                        }
                    }

                    // Spatiality 更新
                    updateSpatiality();

                    // UI
                    areaNameEl.textContent = currentAreaName;
                    stateValEl.textContent = currentDesc + '\nFOV: ' + currentFov.toFixed(1) + '°';
                }

                // カメラ更新
                camera.position.copy(player.pos);
                camera.rotation.set(player.pitch, player.yaw, 0, 'YXZ');

                // ポータル回転
                portal.rotation.y += dt * 0.5;
                portal.rotation.x += dt * 0.15;

                renderer.render(scene, camera);
            }

            animate();

        } catch(e) {
            showError(e.stack || String(e));
        }
    </script>
</body>
</html>
